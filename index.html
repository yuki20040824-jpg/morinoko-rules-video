<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>盗人キッド｜子ども向けルール動画 v2</title>
<style>
:root{
  --ink:#22201b;
  --paper:#fff8e9;
  --white:#fffef8;
  --green:#39a85a;
  --green-soft:#dff3df;
  --blue:#4da6c8;
  --blue-soft:#e3f3fb;
  --yellow:#f1c94d;
  --yellow-soft:#fff2b8;
  --red:#df5a42;
  --red-soft:#ffe0d8;
  --brown:#8d603d;
  --shadow:5px 5px 0 var(--ink);
  --radius:18px;
}
*{box-sizing:border-box}
html,body{margin:0;height:100%;overflow:hidden}
body{
  color:var(--ink);
  background:
    linear-gradient(90deg, rgba(57,168,90,.13) 0 3px, transparent 3px 70px),
    linear-gradient(0deg, rgba(77,166,200,.10) 0 3px, transparent 3px 70px),
    var(--paper);
  font-family:"Hiragino Maru Gothic ProN","Yu Gothic",system-ui,sans-serif;
  display:flex;
  flex-direction:column;
}
button{font-family:inherit}
.progress{
  height:10px;
  background:var(--white);
  border-bottom:3px solid var(--ink);
  flex:none;
}
.bar{
  height:100%;
  width:0%;
  background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));
  transition:width .12s linear;
}
.stage{
  position:relative;
  flex:1;
  min-height:0;
  overflow:hidden;
}
.slide{
  position:absolute;
  inset:16px;
  display:grid;
  grid-template-rows:auto minmax(0,1fr) auto;
  gap:18px;
  opacity:0;
  transform:translateX(28px) scale(.985);
  transition:opacity .38s ease, transform .38s ease;
  pointer-events:none;
}
.slide.active{
  opacity:1;
  transform:translateX(0) scale(1);
  pointer-events:auto;
}
.head{
  display:grid;
  grid-template-columns:auto 1fr auto;
  align-items:center;
  gap:14px;
  max-width:1120px;
  width:100%;
  margin:0 auto;
}
.mascot{
  width:66px;
  max-height:88px;
  object-fit:contain;
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.95));
}
.kicker{
  font-size:.8rem;
  font-weight:900;
  letter-spacing:.08em;
  color:var(--green);
}
/* フェーズごとに見出し色を変え、章の切れ目を字幕なしでも視覚的に示す */
.slide[data-phase="intro"] .kicker{color:var(--blue)}
.slide[data-phase="setup"] .kicker{color:var(--brown)}
.slide[data-phase="turn"] .kicker{color:var(--green)}
.slide[data-phase="exception"] .kicker{color:var(--red)}
.slide[data-phase="build"] .kicker{color:var(--brown)}
.slide[data-phase="end"] .kicker{color:var(--blue)}
.title{
  margin:2px 0 0;
  font-size:clamp(1.55rem, 3.8vw, 3.25rem);
  line-height:1.08;
  letter-spacing:0;
  font-weight:900;
  overflow-wrap:anywhere;
}
.head-info{min-width:0}
.scene-no{
  min-width:68px;
  text-align:center;
  font-weight:900;
  border:3px solid var(--ink);
  background:var(--yellow-soft);
  border-radius:999px;
  padding:7px 10px;
  box-shadow:3px 3px 0 var(--ink);
}
.visual{
  width:100%;
  max-width:1120px;
  min-width:0;
  min-height:0;
  margin:0 auto;
  display:flex;
  align-items:flex-start;
  justify-content:center;
  overflow:hidden;
}
.caption-box{
  max-width:960px;
  width:100%;
  min-width:0;
  margin:0 auto;
  display:flex;
  flex-direction:column;
  gap:8px;
}
.caption{
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:16px;
  box-shadow:4px 4px 0 var(--ink);
  padding:11px 18px;
  font-size:clamp(1rem, 2vw, 1.3rem);
  line-height:1.55;
  font-weight:800;
  overflow-wrap:anywhere;
  opacity:0;
  transform:translateY(10px);
  transition:opacity .42s ease, transform .42s ease;
}
.caption.show{opacity:1;transform:translateY(0)}
.caption.hot{background:var(--yellow-soft)}
.step{
  opacity:0;
  transform:translateY(16px) rotate(-1deg);
  transition:opacity .45s ease, transform .45s ease;
}
.step.show{opacity:1;transform:translateY(0) rotate(0)}
.sticker{
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:var(--radius);
  box-shadow:var(--shadow);
}
/* --- 森林ボード：全シーン共通の定点コンポーネント --- */
.board-scene{
  position:relative;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(14px,3vw,36px);
  flex-wrap:wrap;
  width:min(96vw,1100px);
  margin:0 auto;
}
.board-anchor{
  position:relative;
  width:min(34vw,42vh,300px);
  max-width:92vw;
  aspect-ratio:1448/1086;
  flex:0 0 auto;
}
.board{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  filter:drop-shadow(5px 5px 0 rgba(34,32,27,.9));
}
.state-on-board{
  position:absolute;
  left:47%;
  top:20%;
  width:34%;
  transform:translate(-50%,-50%);
  border-radius:10px;
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.8));
}
.turn-card{
  position:absolute;
  left:80%;
  top:19%;
  width:13%;
  transform:translate(-50%,-50%);
  border-radius:8px;
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.75));
}
.board-tag{
  position:absolute;
  font-size:clamp(.7rem,1.3vw,.95rem);
  font-weight:900;
  color:var(--ink);
  background:var(--white);
  border:2px solid var(--ink);
  border-radius:999px;
  padding:2px 9px;
  transform:translate(-50%,-50%);
  white-space:nowrap;
}
.board-tag.state{left:47%;top:38%}
.board-tag.turn{left:80%;top:33%}
.add-badge{
  position:absolute;
  min-width:32px;
  text-align:center;
  font-weight:900;
  font-size:clamp(.8rem,1.5vw,1.1rem);
  color:var(--white);
  border:2px solid var(--ink);
  border-radius:999px;
  padding:2px 8px;
  box-shadow:2px 2px 0 var(--ink);
  transform:translate(-50%,-50%);
}
.add-badge.wood{background:var(--green);left:26%;top:55%}
.add-badge.water{background:var(--blue);left:50%;top:57%}
.add-badge.soil{background:var(--brown);left:74%;top:55%}
.round-note{
  display:flex;
  flex-direction:column;
  gap:10px;
  padding:16px 18px;
  min-width:min(90vw,246px);
}
.round-note .note-title{font-weight:900;font-size:clamp(1rem,1.8vw,1.2rem);text-align:center}
.cmp-row{
  display:flex;
  align-items:center;
  gap:10px;
  font-weight:900;
  font-size:clamp(.9rem,1.6vw,1.1rem);
  line-height:1.35;
  border:2px solid var(--ink);
  border-radius:14px;
  padding:8px 10px;
  background:var(--green-soft);
}
.cmp-row.tired{background:var(--red-soft)}
.mini-state{
  width:clamp(72px,10vw,104px);
  aspect-ratio:288/170;
  object-fit:contain;
  border-radius:8px;
  border:2px solid var(--ink);
  flex:none;
}
.down1{color:var(--red)}
.place-demo{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(18px,4vw,52px);
  flex-wrap:wrap;
  width:min(94vw,940px);
}
.place-card-wrap{
  position:relative;
  height:min(28vh,220px);
  max-width:44vw;
  aspect-ratio:650/1075;
}
.place-card-wrap.small{height:min(28vh,220px);max-width:30vw;margin:0 auto}
.place-card-wrap .card-img{width:100%;height:100%}
/* 数字カード（しげん置き場つき）を裏→表にめくるための上書き */
.place-card-wrap .flip-card{
  width:100%;
  height:100%;
  aspect-ratio:650/1075;
}
.place-card-wrap .flip-face{border-radius:10px}
.place-card-wrap .place-slots{z-index:2}
/* しげん置き場：何個でも置けるよう、絶対配置の固定スロットではなく折り返しで並べる */
/* カードの白枠（しげん置き場）はおよそ 縦55〜92%・横10〜90% の範囲 */
.place-slots{
  position:absolute;
  left:12%;
  right:12%;
  top:56%;
  bottom:9%;
  display:flex;
  flex-wrap:wrap;
  align-content:center;
  justify-content:center;
  gap:6%;
}
.drop-token{
  width:25%;
  aspect-ratio:1;
  object-fit:contain;
  filter:drop-shadow(2px 2px 0 rgba(34,32,27,.55));
}
.drop-token.step{transform:translateY(-12px) scale(1.06)}
.drop-token.step.show{transform:translateY(0) scale(1)}
.place-guide{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
  padding:16px 20px;
}
.recover-side{
  display:flex;
  flex-direction:column;
  gap:6px;
  align-items:center;
}
.recover-card-box{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
}
.recover-card-box .card-img{width:clamp(52px,6vw,74px)}
.get-one{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:4px;
  padding:8px 12px;
  min-width:min(88vw,222px);
}
.get-one .res{width:clamp(36px,5vw,48px);height:clamp(36px,5vw,48px)}
.hex-token{
  position:absolute;
  width:5.8%;
  aspect-ratio:1;
  filter:drop-shadow(2px 2px 0 rgba(34,32,27,.55));
}
.wood-zone{left:16%;top:60%}
.water-zone{left:46%;top:62%}
.soil-zone{left:74%;top:60%}
.hex-token.small-token{width:8%}
.zone-token{opacity:1}
.zone-token.show{opacity:.15}
.resource-label{
  position:absolute;
  font-size:clamp(.8rem,1.4vw,1.05rem);
  font-weight:900;
  background:var(--white);
  border:2px solid var(--ink);
  border-radius:999px;
  padding:3px 10px;
}
.state-tile{
  width:clamp(185px,24vw,290px);
  aspect-ratio:288/170;
  object-fit:contain;
  border-radius:18px;
  filter:drop-shadow(4px 4px 0 rgba(34,32,27,.75));
}
.state-tile.mini{width:clamp(56px,9vw,84px)}
.table{
  width:min(92vw,980px);
  min-height:min(360px,40vh);
  max-height:56vh;
  padding:24px;
  background:var(--green-soft);
  border:3px solid var(--ink);
  border-radius:28px;
  box-shadow:var(--shadow);
  display:flex;
  align-items:center;
  justify-content:center;
  gap:22px;
  flex-wrap:wrap;
  overflow:hidden;
}
.card-img{
  width:clamp(92px, 13vw, 160px);
  aspect-ratio:650/1075;
  object-fit:contain;
  border-radius:10px;
  filter:drop-shadow(4px 4px 0 rgba(34,32,27,.85));
}
.card-img.big{width:clamp(130px, 18vw, 218px)}
.card-img.small{width:clamp(68px, 9vw, 106px)}
.card-img.hero{width:auto;height:min(230px,32vh);aspect-ratio:650/1075}
.card-row{
  display:flex;
  gap:12px;
  align-items:flex-end;
  justify-content:center;
  flex-wrap:wrap;
}
.choice-pack{
  display:grid;
  grid-template-columns:1fr;
  gap:12px;
  align-items:center;
  justify-items:center;
}
.pill{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:7px;
  min-height:34px;
  padding:7px 13px;
  font-weight:900;
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:999px;
  box-shadow:3px 3px 0 var(--ink);
}
.resource-line{
  display:flex;
  gap:8px;
  justify-content:center;
  flex-wrap:wrap;
}
.res{
  width:40px;
  height:40px;
  object-fit:contain;
  filter:drop-shadow(2px 2px 0 rgba(34,32,27,.6));
}
.res.small{width:30px;height:30px}
.take-layout{
  display:grid;
  grid-template-columns:1fr auto 1fr;
  align-items:center;
  gap:18px;
  width:min(94vw,940px);
}
.person{
  min-width:190px;
  padding:14px;
  text-align:center;
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:18px;
  box-shadow:var(--shadow);
}
.person-name{
  font-size:1.15rem;
  font-weight:900;
  margin:0 0 8px;
}
.card-pad{
  min-height:78px;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:4px;
  border:3px dashed var(--ink);
  border-radius:14px;
  background:var(--yellow-soft);
}
.arrow{
  font-size:clamp(2rem,5vw,4rem);
  font-weight:900;
}
.state-flow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:24px;
  flex-wrap:wrap;
}
.state-card{
  display:grid;
  justify-items:center;
  gap:10px;
}
.state-card img{width:clamp(125px,17vw,190px)}
.state-card.tired .pill{background:var(--red-soft)}
.state-card.healthy .pill{background:var(--green-soft)}
.make-grid{
  display:grid;
  grid-template-columns:repeat(4, minmax(110px, 1fr));
  gap:16px;
  width:min(92vw,860px);
}
.make-item{
  display:grid;
  justify-items:center;
  gap:6px;
  padding:12px 8px;
}
.make-item img{width:min(100%,130px)}
.points{
  color:var(--green);
  font-weight:900;
  font-size:1.15rem;
}
.result-panels{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:18px;
  width:min(92vw,920px);
}
.result-panel{
  padding:20px;
  min-height:min(260px,32vh);
  max-height:52vh;
  display:grid;
  align-content:center;
  justify-items:center;
  gap:12px;
  text-align:center;
  overflow:hidden;
}
.result-panel.ok{background:var(--green-soft)}
.result-panel.bad{background:var(--red-soft)}
.result-panel img{width:clamp(110px,17vw,175px)}
.result-panel .state-tile{width:clamp(170px,23vw,260px)}
.large-word{
  font-size:clamp(1.7rem,4vw,3rem);
  line-height:1.15;
  font-weight:900;
}
/* 得点パネル：カード4枚が枠とかぶらないよう小さめにし、左上の点数を赤丸で囲む */
.result-panel .card-row{gap:6px}
.result-card{position:relative;display:inline-block}
.result-card .card-img{width:clamp(56px,7.5vw,84px)}
.card-num-ring{
  position:absolute;
  left:8%;
  top:9%;
  width:24%;
  aspect-ratio:1;
  border:4px solid var(--red);
  border-radius:50%;
  pointer-events:none;
}
.count-num{font-variant-numeric:tabular-nums;color:var(--green)}
.controls{
  flex:none;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
  padding:10px 12px;
  background:var(--white);
  border-top:3px solid var(--ink);
  flex-wrap:wrap;
}
.ctrl{
  min-width:82px;
  min-height:40px;
  border:3px solid var(--ink);
  border-radius:12px;
  background:var(--white);
  box-shadow:3px 3px 0 var(--ink);
  color:var(--ink);
  font-size:.95rem;
  font-weight:900;
  cursor:pointer;
}
.ctrl:active{transform:translate(2px,2px);box-shadow:1px 1px 0 var(--ink)}
.ctrl.primary{background:var(--green);color:#fff}
.dots{
  display:flex;
  gap:5px;
  flex-wrap:wrap;
  justify-content:center;
  max-width:320px;
}
.dot{
  width:11px;
  height:11px;
  border:2px solid var(--ink);
  background:var(--white);
  border-radius:999px;
  cursor:pointer;
}
.dot.active{width:24px;background:var(--yellow)}
.count{
  min-width:76px;
  text-align:center;
  font-weight:900;
}
.moving-res{
  animation:hop 1.2s ease-in-out infinite;
}
@keyframes hop{
  0%,100%{transform:translateY(0) rotate(-3deg)}
  50%{transform:translateY(-10px) rotate(3deg)}
}
/* --- 横取り強調 --- */
.steal-mid{
  display:grid;
  justify-items:center;
  gap:6px;
}
.grab-hand{
  font-size:clamp(2.2rem,6vw,3.6rem);
  animation:grab 1s ease-in-out infinite;
}
@keyframes grab{
  0%,100%{transform:translateX(-9px) rotate(-10deg)}
  50%{transform:translateX(9px) rotate(10deg)}
}
body.paused .moving-res,
body.paused .grab-hand,
body.paused .ng-mark{animation-play-state:paused}
.card-pad.steal-from{position:relative;border-color:var(--red);background:var(--red-soft)}
.taken-stamp{
  position:absolute;
  inset:0;
  display:flex;
  align-items:center;
  justify-content:center;
  background:rgba(223,90,66,.86);
  color:#fff;
  font-weight:900;
  font-size:1.05rem;
  border-radius:12px;
  transform:rotate(-8deg);
}
.card-pad.steal-to{
  flex-direction:column;
  gap:6px;
  border-color:var(--green);
  background:var(--green-soft);
}
.pill.got{background:var(--green);color:#fff}
/* --- NGハイライト（つかれた森トリガー） --- */
.ng-mark{
  position:absolute;
  width:15%;
  aspect-ratio:1;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:clamp(1.4rem,3.6vw,2.4rem);
  font-weight:900;
  color:#fff;
  background:var(--red);
  border:3px solid var(--ink);
  border-radius:999px;
  transform:translate(-50%,-50%);
  box-shadow:3px 3px 0 var(--ink);
  animation:shake .4s ease-in-out 3;
}
@keyframes shake{
  0%,100%{transform:translate(-50%,-50%) rotate(0)}
  25%{transform:translate(-50%,-50%) rotate(-12deg)}
  75%{transform:translate(-50%,-50%) rotate(12deg)}
}
/* --- 森の状態カードを裏返す演出 --- */
.flip-anchor{perspective:800px}
.flip-card{
  position:relative;
  width:100%;
  aspect-ratio:288/170;
  transform-style:preserve-3d;
  transition:transform .7s cubic-bezier(.4,.2,.2,1);
}
.flip-card.step{opacity:1;transform:rotateY(0)}
.flip-card.step.show{transform:rotateY(180deg)}
.flip-face{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  object-fit:contain;
  border-radius:10px;
  backface-visibility:hidden;
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.8));
}
.flip-face.back{transform:rotateY(180deg)}
body.paused .flip-card{transition-duration:.001ms}
/* --- ターンカードを裏→表にめくる演出 --- */
.turn-flip-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  flex:0 0 auto;
}
.turn-flip{
  position:relative;
  width:min(24vw,190px);
}
.turn-flip .flip-card{aspect-ratio:650/1075}
.turn-flip .flip-face{border-radius:8px}
/* ターンカード下段の数字を囲むリング */
.num-ring{
  position:absolute;
  left:8%;
  right:8%;
  top:77%;
  bottom:4.5%;
  border:4px dashed var(--red);
  border-radius:14px;
  pointer-events:none;
  z-index:2;
}
/* トークンのかたまりを各ブロックの六角形の中心に合わせるアンカー */
.wood-zone.cluster{left:11.5%;top:57%}
.water-zone.cluster{left:41.5%;top:58%}
.soil-zone.cluster{left:70.5%;top:57%}
/* 小さめトークン（8%幅）はかたまりが広くなるぶん、開始位置を左上に寄せる */
.hex-token.small-token.wood-zone.cluster{left:7.5%;top:55%}
.hex-token.small-token.water-zone.cluster{left:37.5%;top:56%}
.hex-token.small-token.soil-zone.cluster{left:66.5%;top:55%}
/* 手番プレイヤーの小さいカードを裏→表にめくる */
.flow-flip{
  position:relative;
  grid-area:card;
  width:clamp(38px,4vw,50px);
  perspective:600px;
}
.flow-flip .flip-card{aspect-ratio:650/1075}
.flow-flip .flip-face{border-radius:6px;filter:drop-shadow(2px 2px 0 rgba(34,32,27,.6))}
.flow-flip .place-slots{z-index:2}
/* しげん置き場にトークンを置く見せ方：カードを大きめにして1列レイアウトにする */
.flow-player.solo{
  grid-template-columns:1fr;
  grid-template-areas:"name" "card" "note";
  justify-items:center;
}
.flow-player.solo .flow-flip{width:clamp(60px,7vw,92px)}
.flow-player.solo .take-note{grid-area:note;text-align:center}
/* トークン→プレイヤーを実際の要素位置で結ぶ矢印レイヤー（JSで描画） */
.arrow-layer{
  position:absolute;
  inset:0;
  width:100%;
  height:100%;
  pointer-events:none;
  z-index:4;
  overflow:visible;
}
/* 森のトークン全体を囲んで合計数を見せるリング */
.count-ring{
  position:absolute;
  left:3.5%;
  right:3.5%;
  top:49%;
  bottom:17%;
  border:4px dashed var(--red);
  border-radius:20px;
  z-index:2;
  pointer-events:none;
}
.count-ring .count-badge,
.flip-ring .count-badge{
  position:absolute;
  left:50%;
  bottom:0;
  transform:translate(-50%,55%);
  background:var(--red);
  color:#fff;
  font-weight:900;
  border:2px solid var(--ink);
  border-radius:999px;
  padding:3px 14px;
  white-space:nowrap;
  font-size:clamp(.78rem,1.6vw,1.05rem);
  box-shadow:2px 2px 0 var(--ink);
}
/* 森の状態カードのまわりを囲むリング */
.flip-ring{
  position:absolute;
  left:47%;
  top:20%;
  width:38%;
  aspect-ratio:288/170;
  transform:translate(-50%,-50%);
  border:4px dashed var(--red);
  border-radius:14px;
  z-index:3;
  pointer-events:none;
}
/* .stepの出現アニメが中央寄せのtransformを上書きしないようにする */
.flip-ring.step{transform:translate(-50%,-50%) translateY(16px)}
.flip-ring.step.show{transform:translate(-50%,-50%)}
/* ボード脇の短い説明ラベル */
.side-labels{
  display:flex;
  flex-direction:column;
  gap:12px;
  flex:0 0 auto;
  align-items:center;
}
.side-labels .pill{text-align:center}
/* 手札の扇形表示（カード同士を重ねる） */
.hand-fan{
  display:flex;
  justify-content:center;
  align-items:flex-end;
  padding:14px 6px 6px;
}
.hand-fan .fan-card{
  position:relative;
  transform-origin:50% 100%;
}
.hand-fan .fan-card + .fan-card{margin-left:calc(-1 * clamp(30px,4.5vw,58px))}
.hand-fan .fan-card img{display:block}
.hand-fan .fan-card.picked{z-index:5}
/* 数字の枠から森林エリアへ伸びる矢印 */
.flow-arrow{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:10px;
  flex:0 0 auto;
  margin-top:clamp(30px,9vh,80px);
}
.flow-arrow .shaft{
  position:relative;
  width:clamp(70px,11vw,150px);
  border-top:6px dashed var(--red);
}
.flow-arrow .shaft::after{
  content:'';
  position:absolute;
  right:-8px;
  top:-14px;
  width:0;
  height:0;
  border:11px solid transparent;
  border-left:18px solid var(--red);
}
.flow-side{
  display:grid;
  gap:8px;
  width:min(26vw,230px);
  flex:0 0 auto;
}
.flow-player{
  position:relative;
  min-height:0;
  padding:7px;
  display:grid;
  grid-template-columns:auto 1fr;
  grid-template-areas:"name name" "card goods";
  gap:6px;
  justify-items:center;
  align-items:center;
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:16px;
  box-shadow:3px 3px 0 var(--ink);
}
.turn-badge{
  position:absolute;
  left:-12px;
  top:-12px;
  width:30px;
  height:30px;
  display:flex;
  align-items:center;
  justify-content:center;
  background:var(--ink);
  color:#fff;
  font-weight:900;
  font-size:.9rem;
  border-radius:999px;
  box-shadow:2px 2px 0 var(--ink);
  z-index:2;
}
.flow-player.you{background:var(--yellow-soft)}
.flow-player.active{
  background:var(--green-soft);
  border-color:var(--green);
}
.flow-name{
  grid-area:name;
  margin:0;
  font-weight:900;
  font-size:.82rem;
}
.flow-card{
  grid-area:card;
  width:clamp(38px,4vw,50px);
  aspect-ratio:650/1075;
  object-fit:contain;
  border-radius:8px;
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.75));
}
.taken-goods{
  grid-area:goods;
  min-width:96px;
  min-height:0;
  padding:5px;
  display:grid;
  align-content:center;
  justify-items:center;
  gap:3px;
  border:3px dashed var(--ink);
  border-radius:14px;
  background:var(--yellow-soft);
}
.taken-goods .resource-line{gap:3px}
.taken-goods .res.small{width:24px;height:24px}
.taken-goods.recovery{
  min-width:146px;
  background:var(--green-soft);
}
.recovery-lines{
  display:grid;
  gap:5px;
  justify-items:center;
}
.recover-plus{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:3px;
  font-weight:900;
  color:var(--green);
}
.recover-plus .res.small{width:22px;height:22px}
.recover-pick{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:5px;
  padding-top:4px;
  border-top:2px dashed rgba(34,32,27,.55);
  font-weight:900;
}
.recover-pick .res.small{width:25px;height:25px}
.take-note{
  font-size:.78rem;
  font-weight:900;
  color:var(--brown);
}
.recovery-burst{
  position:absolute;
  left:50%;
  top:47%;
  transform:translate(-50%,-50%);
  z-index:3;
  display:grid;
  justify-items:center;
  gap:4px;
  padding:8px 10px;
  background:var(--green-soft);
  border:3px solid var(--ink);
  border-radius:14px;
  box-shadow:3px 3px 0 var(--ink);
}
.recovery-burst .take-note{color:var(--green)}
.recovery-burst .resource-line{gap:2px}
.recovery-burst .res.small{width:24px;height:24px}
.turn-order{
  position:absolute;
  left:50%;
  top:13%;
  transform:translate(-50%,-50%);
}
/* .stepの出現アニメが中央寄せのtransformを上書きしないようにする */
.turn-order.step{transform:translate(-50%,-50%) translateY(16px) rotate(-1deg)}
.turn-order.step.show{transform:translate(-50%,-50%)}
.turn-order{
  padding:5px 10px;
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:999px;
  box-shadow:2px 2px 0 var(--ink);
  font-weight:900;
  font-size:clamp(.62rem,1.6vw,.78rem);
  white-space:nowrap;
  z-index:2;
}
/* --- 全体ループ図 --- */
.loop-wrap{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:14px;
  width:100%;
}
.loop-flow{
  display:flex;
  align-items:center;
  justify-content:center;
  gap:clamp(6px,1.8vw,18px);
  flex-wrap:wrap;
  width:min(96vw,1080px);
}
.loop-step{
  display:grid;
  justify-items:center;
  gap:6px;
  max-width:150px;
}
.loop-note{
  font-size:.72rem;
  font-weight:800;
  color:var(--brown);
  text-align:center;
  line-height:1.3;
}
/* ①〜⑤を必ず1行に収める（全体の流れシーン専用） */
.loop-flow.single-row{
  flex-wrap:nowrap;
  align-items:flex-start;
  gap:clamp(3px,1vw,10px);
  width:100%;
}
.loop-flow.single-row .loop-step{
  display:grid;
  grid-template-rows:clamp(46px,9vw,92px) auto;
  align-items:center;
  justify-items:center;
  row-gap:5px;
  max-width:none;
  flex:1 1 0;
  min-width:0;
}
/* アイコンは全ステップ共通の固定高さの枠内に収め、下のラベルが必ず同じ高さに並ぶようにする */
.loop-flow.single-row .loop-step > img,
.loop-flow.single-row .loop-step > .flip-anchor,
.loop-flow.single-row .loop-step > .resource-line{
  grid-row:1;
  align-self:center;
  max-width:100%;
  max-height:100%;
}
.loop-flow.single-row .loop-step > img{
  width:auto;
  height:auto;
}
.loop-flow.single-row .loop-step > .flip-anchor{
  width:auto;
  height:100%;
  aspect-ratio:650/1075;
}
.loop-flow.single-row .loop-step .flip-card{
  width:100%;
  height:100%;
  aspect-ratio:650/1075;
}
.loop-flow.single-row .loop-step > .pill{
  grid-row:2;
}
.loop-flow.single-row .pill{
  font-size:clamp(.68rem,1.85vw,1rem);
  padding:5px 7px;
  line-height:1.3;
}
.loop-flow.single-row .arrow{
  font-size:clamp(1.1rem,2.4vw,1.75rem);
  flex:0 0 auto;
}
/* --- ルールのおさらい --- */
.recap-list{
  display:flex;
  flex-direction:column;
  gap:10px;
  width:min(92vw,760px);
}
.recap-item{
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 16px;
  background:var(--white);
  border:3px solid var(--ink);
  border-radius:14px;
  box-shadow:3px 3px 0 var(--ink);
  font-weight:800;
  font-size:clamp(.92rem,1.7vw,1.12rem);
}
.recap-item .check{
  flex:none;
  width:28px;
  height:28px;
  border-radius:999px;
  background:var(--green);
  color:#fff;
  display:flex;
  align-items:center;
  justify-content:center;
  font-weight:900;
}
/* --- 自然資本と生態系サービス（イントロ） --- */
.capital-scene{
  display:flex;
  flex-direction:row;
  align-items:center;
  justify-content:center;
  gap:clamp(14px,3vw,44px);
  flex-wrap:wrap;
  width:min(96vw,1020px);
}
.tub-col, .life-col{
  display:flex;
  flex-direction:column;
  align-items:center;
  gap:8px;
}
.tub-wrap{
  position:relative;
  padding:8px 20px 14px;
}
.tub{
  position:relative;
  width:min(30vw,150px);
  height:min(20vh,94px);
  border:4px solid var(--ink);
  border-radius:14px 14px 22px 22px;
  background:var(--white);
  overflow:hidden;
  box-shadow:3px 3px 0 var(--ink);
}
.tub-water{
  position:absolute;
  left:0;right:0;bottom:0;
  height:0%;
  background:linear-gradient(180deg,var(--blue-soft),var(--blue));
  opacity:1;
  transform:none;
  transition:height 1.3s ease;
}
.tub-water.show{height:72%}
.tub-spout{
  position:absolute;
  left:50%;
  bottom:-10px;
  width:16px;
  height:14px;
  background:var(--brown);
  border:3px solid var(--ink);
  border-radius:0 0 6px 6px;
  transform:translateX(-50%);
}
.drip-zone{
  position:relative;
  width:24px;
  height:42px;
  margin-top:-10px;
}
.drip{
  position:absolute;
  left:50%;
  top:-14px;
  width:12px;
  height:16px;
  background:var(--blue);
  border-radius:50% 50% 50% 50% / 60% 60% 40% 40%;
  transform:translateX(-50%);
  opacity:0;
  animation:dripfall 1.6s ease-in infinite;
}
.drip.d2{animation-delay:.5s}
.drip.d3{animation-delay:1s}
@keyframes dripfall{
  0%{opacity:0; top:-14px}
  10%{opacity:1}
  85%{opacity:1}
  100%{opacity:0; top:40px}
}
.mascot-mini{
  width:clamp(52px,8vw,74px);
  filter:drop-shadow(3px 3px 0 rgba(34,32,27,.85));
}
body.paused .drip{animation-play-state:paused}
@media (max-width:760px){
  .slide{inset:10px;gap:8px}
  .head{grid-template-columns:auto 1fr;gap:10px}
  .scene-no{display:none}
  .mascot{width:52px}
  .table{min-height:min(300px,34vh);padding:16px;gap:12px}
  .take-layout{grid-template-columns:1fr;gap:6px}
  .arrow{transform:rotate(90deg)}
  .place-card-wrap.small{height:min(16vh,120px)}
  .steal-mid{gap:2px}
  .person{padding:6px}
  .person-name{font-size:.85rem;margin-bottom:4px}
  .make-grid{grid-template-columns:repeat(2,minmax(120px,1fr));gap:10px}
  .result-panels{grid-template-columns:1fr;gap:10px}
  .board-scene{gap:6px}
  .board-anchor{order:-1;width:min(66vw,240px);margin:0 auto 2px}
  /* じゅんびシーンは「カード→矢印→ボード」の順を保つ */
  .board-anchor.keep-order{order:0}
  .flow-arrow{margin-top:0}
  .flow-arrow .shaft{width:44px;transform:rotate(90deg);margin:16px 0}
  .hand-fan .fan-card + .fan-card{margin-left:-42px}
  .side-labels{order:-2;width:100%;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:6px}
  .flow-side{width:100%;display:grid;grid-template-columns:1fr 1fr;gap:6px}
  .flow-player{
    min-height:100px;
    padding:6px;
    gap:5px;
  }
  .flow-name{font-size:.78rem}
  .flow-card{width:42px}
  .taken-goods{
    min-width:86px;
    min-height:54px;
    padding:5px;
  }
  .taken-goods .res.small{width:18px;height:18px}
  .taken-goods.recovery{min-width:100px}
  .recovery-lines{gap:3px}
  .recover-plus .res.small,
  .recover-pick .res.small{width:17px;height:17px}
  .recovery-burst{
    padding:5px 7px;
    top:49%;
  }
  .recovery-burst .res.small{width:17px;height:17px}
  .take-note{font-size:.68rem}
  .caption{padding:9px 13px}
  .controls{gap:6px;padding:8px}
  .ctrl{min-width:66px;font-size:.85rem}
  .dots{display:none}
  .tub{width:min(50vw,140px);height:min(24vh,96px)}
}
@media (prefers-reduced-motion: reduce){
  *{animation-duration:.001ms!important;transition-duration:.001ms!important}
}

<body>
<div id="loader" style="position:fixed;inset:0;z-index:50;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;background:var(--paper)">
  <img src="カード/mascot.png" alt="" style="width:96px;filter:drop-shadow(3px 3px 0 rgba(34,32,27,.9))">
  <div style="font-size:1.2rem;font-weight:900;color:var(--ink)">よみこみ中…</div>
  <div style="width:min(70vw,320px);height:14px;border:3px solid var(--ink);border-radius:999px;background:var(--white);overflow:hidden">
    <div id="loaderBar" style="height:100%;width:0%;background:linear-gradient(90deg,var(--green),var(--yellow),var(--blue));transition:width .2s"></div>
  </div>
  <div id="loaderPct" style="font-size:.9rem;font-weight:900;color:var(--ink)">0%</div>
</div>
<div class="progress"><div class="bar" id="bar"></div></div>
<main class="stage" id="stage" aria-live="polite"></main>
<nav class="controls" aria-label="動画操作">
  <button class="ctrl" id="prevBtn" type="button">前へ</button>
  <button class="ctrl primary" id="playBtn" type="button">一時停止</button>
  <button class="ctrl" id="nextBtn" type="button">次へ</button>
  <button class="ctrl" id="restartBtn" type="button">最初から</button>
  <div class="count" id="count">1 / 10</div>
  <div class="dots" id="dots" aria-label="シーン選択"></div>
</nav>

<script>
const CARD = 'カード/';
const IMG = {
  mascot: CARD + 'mascot.png',
  board: CARD + 'board.jpg',
  wood: CARD + 'tokens/wood.png',
  water: CARD + 'tokens/water.png',
  soil: CARD + 'tokens/soil.png',
  n1: CARD + '数字カード/28.jpg',
  n2: CARD + '数字カード/29.jpg',
  n3: CARD + '数字カード/30.jpg',
  n4: CARD + '数字カード/31.jpg',
  n5: CARD + '数字カード/32.jpg',
  n6: CARD + '数字カード/33.jpg',
  recov: CARD + '回復カード/53.jpg',
  recovWater: CARD + '回復カード/52.png',
  recovSoil: CARD + '回復カード/53.png',
  numBack: CARD + '数字カード裏面.png',
  turn1: CARD + 'もりノコ_カード_ターンカード4人以下/34.jpg',
  turnBack: CARD + 'もりノコ_カード_ターンカード4人以下/ターンカード裏面.png',
  healthy: CARD + 'もりノコ_カード/59.jpg',
  tired: CARD + 'もりノコ_カード/60.jpg',
  healthyState: CARD + 'state/healthy.jpg',
  tiredState: CARD + 'state/tired.jpg',
  warn: CARD + 'もりノコ_カード/警告カード.jpg',
  exit: CARD + 'もりノコ_カード/退場カード.png',
  chopsticks: CARD + '1.jpg',
  violin: CARD + '2.jpg',
  sauna: CARD + '8.jpg',
  washoku: CARD + '14.jpg',
  satoyama: CARD + '15.jpg'
};
const PACE = 1.3; // 1.0が元の速さ。大きいほどゆっくり再生される
const LINE_GAP = Math.round(2200 * PACE);
const HOLD_AFTER = Math.round(2100 * PACE);
const STEP_BASE = Math.round(360 * PACE);
const CAP_BASE = Math.round(520 * PACE);
const COUNT_DURATION = 900;
const token = (kind, cls='') => `<img class="res ${cls}" src="${IMG[kind]}" alt="${kindLabel(kind)}">`;
const kindLabel = kind => ({wood:'木',water:'水',soil:'土'})[kind] || kind;
const tokenLine = list => `<div class="resource-line">${list.map(k => token(k, 'small')).join('')}</div>`;
// トークンは3個ずつの段組みで、ブロックの六角形の中に収まるように並べる
const zoneTokens = (zoneClass, kind, takenSteps) => takenSteps.map((st,i) => {
  const col = i % 3, row = Math.floor(i / 3);
  const cls = st != null ? ' zone-token step' : '';
  const dataStep = st != null ? ` data-step="${st}"` : '';
  return `<img class="hex-token ${zoneClass}${cls}" style="transform:translate(${col*105 + row*52}%,${row*95}%)" src="${IMG[kind]}" alt="${kindLabel(kind)}"${dataStep}>`;
}).join('');
// 森にしげんが「実際に追加される」演出用（zoneTokensと違い、追加後に薄くならない）
// 3個ずつの段組みで、ブロックの六角形の中に収まるように並べる
const addTokens = (zoneClass, kind, count, step) => Array.from({length:count}).map((_,i) => {
  const col = i % 3, row = Math.floor(i / 3);
  return `<img class="hex-token ${zoneClass} step" data-step="${step}" style="transform:translate(${col*105 + row*52}%,${row*95}%)" src="${IMG[kind]}" alt="${kindLabel(kind)}">`;
}).join('');
// 森林ボードは全シーン共通のこの関数だけを通して描画する（サイズ・位置を常に固定するため）
function renderBoard({ state='healthy', turnCardKey=null, tokenCls='', wood=[], water=[], soil=[], tags='', overlay='', cls='', dataStep=null, hideState=false }){
  const classes = ['board-anchor', cls].filter(Boolean).join(' ');
  const stepAttr = dataStep != null ? ` data-step="${dataStep}"` : '';
  const stateKey = state === 'healthy' ? 'healthyState' : 'tiredState';
  const stateLabel = state === 'healthy' ? '元気な森' : 'つかれた森';
  const zoneCls = tokenCls ? ' ' + tokenCls : '';
  return `
    <div class="${classes}"${stepAttr}>
      <img class="board" src="${IMG.board}" alt="森林ボード">
      ${hideState ? '' : `<img class="state-on-board" src="${IMG[stateKey]}" alt="森の状態カード（${stateLabel}）">`}
      ${turnCardKey ? `<img class="turn-card" src="${IMG[turnCardKey]}" alt="ターンカード">` : ''}
      ${zoneTokens('wood-zone cluster' + zoneCls,'wood',wood)}
      ${zoneTokens('water-zone cluster' + zoneCls,'water',water)}
      ${zoneTokens('soil-zone cluster' + zoneCls,'soil',soil)}
      ${tags}
      ${overlay}
    </div>`;
}
// トークン置き場（六角形）と各プレイヤーの数字カードの「しげん置き場」を、実際の表示位置で結ぶ矢印。
// 表示タイミングは結び先のカードがめくれた（.flip-card.show）タイミングに連動させる。
const ARROW_LINKS = [
  { zoneX:.20, zoneY:.62, card:0 },
  { zoneX:.20, zoneY:.62, card:1 },
  { zoneX:.79, zoneY:.62, card:2 }
];
function updateArrows(){
  const svg = document.querySelector('#stage .arrow-layer');
  if(!svg) return;
  const host = svg.parentElement;
  const hostRect = host.getBoundingClientRect();
  const board = host.querySelector('.board-anchor');
  const cardEls = host.querySelectorAll('.flow-flip');
  if(hostRect.width < 2 || !board || !cardEls.length) return;
  svg.setAttribute('viewBox', `0 0 ${hostRect.width} ${hostRect.height}`);
  const b = board.getBoundingClientRect();
  let html = '<defs><marker id="arrowHead" markerWidth="8" markerHeight="8" refX="6" refY="4" orient="auto"><path d="M0,0 L8,4 L0,8 z" fill="#df5a42"/></marker></defs>';
  ARROW_LINKS.forEach(link => {
    const g = cardEls[link.card];
    if(!g) return;
    const gr = g.getBoundingClientRect();
    const x1 = b.left + b.width * link.zoneX - hostRect.left;
    const y1 = b.top + b.height * link.zoneY - hostRect.top;
    // しげん置き場はカードの下側（縦およそ73%あたり）にある
    const slotY = gr.top + gr.height * .73;
    let x2, y2;
    if(gr.top >= b.bottom - 4){
      // 縦積みレイアウト：カードの上辺の中央へつなぐ
      x2 = (gr.left + gr.right) / 2 - hostRect.left;
      y2 = gr.top - hostRect.top;
    } else if((gr.left + gr.right) / 2 > (b.left + b.right) / 2){
      x2 = gr.left - hostRect.left;
      y2 = slotY - hostRect.top;
    } else {
      x2 = gr.right - hostRect.left;
      y2 = slotY - hostRect.top;
    }
    const flip = g.querySelector('.flip-card');
    const show = !!(flip && flip.classList.contains('show'));
    html += `<line x1="${x1}" y1="${y1}" x2="${x2}" y2="${y2}" stroke="#df5a42" stroke-width="5" stroke-dasharray="10 7" stroke-linecap="round" marker-end="url(#arrowHead)" opacity="${show ? 1 : 0}" style="transition:opacity .4s ease"/>`;
  });
  svg.innerHTML = html;
}

          <div class="loop-step step" data-step="2">
            ${tokenLine(['wood','water','soil'])}
            <div class="pill" style="white-space:nowrap">③取る/回復する</div>
          </div>
          <div class="arrow step" data-step="2">→</div>
          <div class="loop-step step" data-step="3">

  {

    visual:`

        <img class="card-img hero" src="${IMG.mascot}" alt="ゲームのマスコット">
        <div class="pill hot" style="font-size:clamp(1.5rem,3.6vw,2.8rem);line-height:1.35;padding:16px 30px;border-radius:26px;text-align:center">「かちまけ」</div>
      </div>`
  },
  {
    kicker:'かちまけ',
    phase:'end',
    title:'森が元気なら、点数勝負',
    captions:[],
    visual:`
      <div class="result-panels" style="align-self:center">
        <div class="result-panel ok sticker step" data-step="0">
          <img class="state-tile" src="${IMG.healthyState}" alt="元気な森">
          <div class="large-word">元気な森</div>
        </div>
        <div class="result-panel sticker step" data-step="1">
          <div class="card-row">
            <div class="result-card">
              <img class="card-img small" src="${IMG.chopsticks}" alt="箸を使う">
              <div class="card-num-ring"></div>
            </div>
            <div class="result-card">
              <img class="card-img small" src="${IMG.violin}" alt="バイオリンを弾く">
              <div class="card-num-ring"></div>
            </div>
            <div class="result-card">
              <img class="card-img small" src="${IMG.sauna}" alt="サウナに入る">
              <div class="card-num-ring"></div>
            </div>
            <div class="result-card">
              <img class="card-img small" src="${IMG.washoku}" alt="和食を作る">
              <div class="card-num-ring"></div>
            </div>
          </div>
          <div class="large-word">得点は<span class="count-num step" data-step="2" data-count-to="16">0</span>点！</div>
        </div>
      </div>`
  },
  {
    kicker:'かちまけ',
    phase:'end',
    title:'森がつかれたままなら、全員脱落',
    captions:[],
    visual:`
      <div class="result-panels" style="align-self:center">
        <div class="result-panel bad sticker step" data-step="0">
          <img class="state-tile" src="${IMG.tiredState}" alt="つかれた森">
          <div class="large-word">全員脱落</div>
        </div>
        <div class="result-panel ok sticker step" data-step="1">
          <img src="${IMG.mascot}" alt="マスコット">
          <div class="large-word">森も、くらしも、元気に</div>
        </div>
      </div>`

];

let current = 0;
let playing = !new URLSearchParams(location.search).has('paused');
let rafId = null;
let elapsed = 0;
let segmentStart = 0;
let duration = 1;
let schedule = [];
const stage = document.getElementById('stage');
const bar = document.getElementById('bar');
const dots = document.getElementById('dots');
const count = document.getElementById('count');
const playBtn = document.getElementById('playBtn');

function buildSlide(scene, index){
  const el = document.createElement('section');
  el.className = 'slide';
  el.dataset.phase = scene.phase || '';
  el.innerHTML = `
    <header class="head">
      <img class="mascot" src="${IMG.mascot}" alt="">
      <div class="head-info">
        <div class="kicker">${scene.kicker}</div>
        <h1 class="title">${scene.title}</h1>
      </div>
      <div class="scene-no">${index+1}/${SCENES.length}</div>
    </header>
    <div class="visual">${scene.visual}</div>
    <div class="caption-box">
      ${scene.captions.map((line,i)=>`<div class="caption ${i===0?'hot':''}" data-cap="${i}">${line}</div>`).join('')}
    </div>
  `;
  return el;
}
function renderDots(){
  dots.innerHTML = SCENES.map((_,i)=>`<button class="dot ${i===current?'active':''}" type="button" aria-label="${i+1}枚目へ" data-go="${i}"></button>`).join('');
  dots.querySelectorAll('.dot').forEach(dot => {
    dot.addEventListener('click', () => goTo(Number(dot.dataset.go)));
  });
}
function cancelTick(){
  if(rafId) cancelAnimationFrame(rafId);
  rafId = null;
}
// 経過時間(elapsed)を基準に、進捗バー・ステップ表示・カウントアップ数字を1本のrAFループで進める。
// 一時停止はこのループを止めるだけなので、再開すると止めた場所から続きになる。
function tick(now){
  elapsed = now - segmentStart;
  const pct = Math.min(100, (elapsed / duration) * 100);
  bar.style.width = pct + '%';
  schedule.forEach(item => {
    if(!item.shown && elapsed >= item.time){
      item.shown = true;
      item.el.classList.add('show');
    }
    if(item.countTo != null && elapsed >= item.time){
      const p = Math.min(1, (elapsed - item.time) / COUNT_DURATION);
      item.el.textContent = Math.round(p * item.countTo);
    }
  });
  updateArrows();
  if(elapsed >= duration){
    if(current < SCENES.length - 1){
      goTo(current + 1);
    } else {
      playing = false;
      updatePlayButton();
    }
    return;
  }
  rafId = requestAnimationFrame(tick);
}
function showSlide(index){
  cancelTick();
  current = index;
  stage.innerHTML = '';
  const scene = SCENES[index];
  const el = buildSlide(scene, index);
  stage.appendChild(el);
  requestAnimationFrame(() => el.classList.add('active'));
  count.textContent = `${index+1} / ${SCENES.length}`;
  renderDots();
  const stepEls = Array.from(el.querySelectorAll('.step'));
  const capEls = Array.from(el.querySelectorAll('.caption'));
  schedule = [];
  let maxStep = 0;
  stepEls.forEach(item => {
    const step = Number(item.dataset.step || 0);
    maxStep = Math.max(maxStep, step);
    const countTo = item.dataset.countTo != null ? Number(item.dataset.countTo) : null;
    schedule.push({ time: STEP_BASE + step * LINE_GAP, el: item, shown:false, countTo });
  });
  capEls.forEach((item, i) => {
    schedule.push({ time: CAP_BASE + i * LINE_GAP, el: item, shown:false, countTo:null });
  });
  const last = Math.max(maxStep, capEls.length - 1);
  duration = scene.duration != null ? scene.duration : 600 + (last + 1) * LINE_GAP + HOLD_AFTER;
  elapsed = 0;
  if(playing){
    bar.style.width = '0%';
    segmentStart = performance.now();
    rafId = requestAnimationFrame(tick);
  } else {
    // 一時停止中に移動した場合は、演出を待たずにこのシーンの内容を全部見せる
    bar.style.width = '0%';
    schedule.forEach(item => {
      item.shown = true;
      item.el.classList.add('show');
      if(item.countTo != null) item.el.textContent = item.countTo;
    });
  }
  // スライドの登場トランジション後に、矢印を実際の位置に合わせて描き直す
  setTimeout(updateArrows, 60);
  setTimeout(updateArrows, 480);
}
function goTo(index){
  showSlide(Math.max(0, Math.min(SCENES.length - 1, index)));
}
function updatePlayButton(){
  playBtn.textContent = playing ? '一時停止' : '再生';
  playBtn.classList.toggle('primary', playing);
  document.body.classList.toggle('paused', !playing);
}
document.getElementById('prevBtn').addEventListener('click', () => goTo(current - 1));
document.getElementById('nextBtn').addEventListener('click', () => goTo(current + 1));
document.getElementById('restartBtn').addEventListener('click', () => {
  playing = true;
  updatePlayButton();
  goTo(0);
});
playBtn.addEventListener('click', () => {
  playing = !playing;
  updatePlayButton();
  if(playing){
    segmentStart = performance.now() - elapsed;
    rafId = requestAnimationFrame(tick);
  } else {
    cancelTick();
  }
});
document.addEventListener('keydown', e => {
  if(e.key === 'ArrowLeft') goTo(current - 1);
  if(e.key === 'ArrowRight') goTo(current + 1);
  if(e.key === ' '){
    e.preventDefault();
    playBtn.click();
  }
});
function preloadAll(done){
  const urls = [...new Set(Object.values(IMG))];
  const loaderBar = document.getElementById('loaderBar');
  const loaderPct = document.getElementById('loaderPct');
  let n = 0;
  if(!urls.length){ done(); return; }
  const bump = () => {
    n++;
    const pct = Math.round(n / urls.length * 100);
    if(loaderBar) loaderBar.style.width = pct + '%';
    if(loaderPct) loaderPct.textContent = pct + '%';
    if(n === urls.length) done();
  };
  urls.forEach(src => {
    const im = new Image();
    im.onload = im.onerror = bump;
    im.src = src;
  });
}
function startShow(){
  const loader = document.getElementById('loader');
  if(loader) loader.remove();
  const s = parseInt(new URLSearchParams(location.search).get('s'), 10);
  showSlide(Number.isInteger(s) ? Math.max(0, Math.min(SCENES.length - 1, s)) : 0);
}
updatePlayButton();
preloadAll(startShow);
</script>
